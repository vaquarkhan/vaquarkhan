spring.datasource.url=jdbc:mysql://db:3306/premium?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=rootpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

weather.api.base-url=https://api.openweathermap.org/data/2.5
weather.api.key=${WEATHER_API_KEY:}
weather.api.units=metric

server.port=8080

# JWT settings
app.jwt.secret=change-this-secret-to-a-long-random-value
app.jwt.expiration-ms=86400000

# Gemini API
gemini.api.key=${GEMINI_API_KEY:}